<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f1722" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>東大蔵書チェッカー</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="head-row">
    <span class="logo" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></span>
    <h1>東大蔵書<span>チェッカー</span></h1>
  </div>
</header>

<div class="wrap">

  <!-- スキャナ -->
  <section class="scanner">
    <div class="viewport idle" id="viewport">
      <div class="vp-idle" id="vpIdle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 9v6M10 9v6M13 9v6M16 9v6"/></svg>
        <p>本の裏表紙のバーコード（978で始まる方）を読み取ります</p>
      </div>
      <div id="reader"></div>
      <div class="frame">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <span class="laser"></span>
      </div>
    </div>
    <div class="scan-controls">
      <button class="btn btn-primary" id="scanBtn">カメラで読み取る</button>
    </div>
    <div class="zoom-row" id="zoomRow" hidden>
      <svg class="zoom-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="range" id="zoom" min="1" max="5" step="0.1" value="2" aria-label="ズーム" />
    </div>
    <div class="toast" id="toast"></div>
  </section>

  <div class="divider">または ISBN を直接入力</div>
  <div class="manual">
    <input type="text" id="manualInput" inputmode="numeric" placeholder="9784000000000" autocomplete="off" spellcheck="false" />
    <button class="btn btn-ghost" id="manualBtn">確認</button>
  </div>

  <!-- 結果 -->
  <section class="result" id="result" hidden>
    <div class="card">
      <div class="book">
        <img class="cover" id="cover" alt="" />
        <div class="book-meta">
          <div class="book-title" id="bTitle">—</div>
          <div class="book-author" id="bAuthor"></div>
          <div class="book-pub" id="bPub"></div>
          <div class="isbn" id="bIsbn"></div>
        </div>
      </div>
      <div class="actions" id="actions"></div>
    </div>
  </section>

  <footer>
    書誌：<a href="https://openbd.jp/" target="_blank" rel="noopener">openBD</a>　/　書影：openBD・Amazon<br/>
    所蔵・貸出状況は<a href="https://opac.dl.itc.u-tokyo.ac.jp/" target="_blank" rel="noopener">東京大学OPAC</a>でご確認ください。
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
